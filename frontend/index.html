<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Chat // terminal</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
<style>
:root{
  --bg:#0a0e0a; --bg2:#0f1410; --panel:#10160f; --border:#1f3a24;
  --green:#39ff7a; --green-dim:#1f8f4a; --pink:#ff3ea5; --pink-dim:#a23070;
  --text:#c9ffd6; --text-dim:#5d8a68; --danger:#ff5454;
}
*{box-sizing:border-box;}
body{margin:0;background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace;height:100vh;overflow:hidden;}
.pixel{font-family:'Press Start 2P',monospace;}
.crt::before{
  content:"";position:fixed;inset:0;pointer-events:none;z-index:999;
  background:repeating-linear-gradient(0deg,rgba(0,0,0,0.18) 0px,rgba(0,0,0,0.18) 1px,transparent 1px,transparent 3px);
  mix-blend-mode:overlay;
}
.crt::after{
  content:"";position:fixed;inset:0;pointer-events:none;z-index:998;
  background:radial-gradient(ellipse at center, rgba(57,255,122,0.04) 0%, rgba(0,0,0,0.35) 100%);
}
#app{display:flex;height:100vh;}

/* AUTH */
#authScreen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:50;}
.auth-box{background:var(--panel);border:2px solid var(--green-dim);padding:32px;width:340px;box-shadow:0 0 24px rgba(57,255,122,0.15);}
.auth-box h1{font-size:13px;color:var(--green);margin:0 0 18px;text-align:center;letter-spacing:1px;}
.auth-box input{width:100%;background:#060906;border:1px solid var(--border);color:var(--text);padding:10px;margin-bottom:10px;font-family:inherit;font-size:13px;}
.auth-box input:focus{outline:none;border-color:var(--green-dim);}
.btn{cursor:pointer;border:1px solid var(--green-dim);background:transparent;color:var(--green);padding:10px;width:100%;font-family:inherit;font-size:12px;letter-spacing:1px;transition:.15s;box-sizing:border-box;}
.btn:hover{background:var(--green-dim);color:#fff;}
.btn-pink{border-color:var(--pink-dim);color:var(--pink);}
.btn-pink:hover{background:var(--pink-dim);color:#fff;}
.toggle-link{color:var(--text-dim);font-size:11px;text-align:center;margin-top:12px;cursor:pointer;}
.toggle-link:hover{color:var(--pink);}
.error-msg{color:var(--danger);font-size:11px;margin-bottom:8px;min-height:14px;}

/* SIDEBAR */
#sidebar{width:280px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;}
.side-header{padding:14px;border-bottom:1px solid var(--border);}
.side-header .logo{font-size:11px;color:var(--green);letter-spacing:1px;}
.new-chat-btn{margin:10px 14px;width:calc(100% - 28px);}
.search-box{margin:0 14px 10px;}
.search-box input{width:100%;background:#060906;border:1px solid var(--border);color:var(--text);padding:7px;font-family:inherit;font-size:11px;}
#chatList{flex:1;overflow-y:auto;padding:0 8px;}
.chat-group-label{font-size:9px;color:var(--text-dim);padding:8px 8px 4px;letter-spacing:1px;}
.chat-item{padding:9px 10px;margin-bottom:2px;cursor:pointer;font-size:11px;color:var(--text);border:1px solid transparent;border-radius:2px;display:flex;justify-content:space-between;align-items:center;gap:6px;white-space:nowrap;overflow:hidden;}
.chat-item span.title{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;}
.chat-item:hover{background:var(--panel);border-color:var(--border);}
.chat-item.active{background:rgba(57,255,122,0.08);border-color:var(--green-dim);color:var(--green);}
.chat-actions{display:none;gap:4px;flex-shrink:0;}
.chat-item:hover .chat-actions{display:flex;}
.chat-actions button{background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:11px;padding:0 2px;}
.chat-actions button:hover{color:var(--pink);}
.side-footer{padding:10px 14px;border-top:1px solid var(--border);font-size:10px;color:var(--text-dim);display:flex;justify-content:space-between;align-items:center;}
.side-footer button{background:none;border:1px solid var(--border);color:var(--text-dim);padding:4px 8px;cursor:pointer;font-family:inherit;font-size:10px;}
.side-footer button:hover{color:var(--pink);border-color:var(--pink-dim);}

/* MAIN */
#main{flex:1;display:flex;flex-direction:column;min-width:0;}
#topbar{padding:12px 18px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;background:var(--bg2);}
#chatTitle{font-size:12px;color:var(--green);letter-spacing:.5px;}
#topbar select{background:#060906;color:var(--text);border:1px solid var(--border);font-family:inherit;font-size:11px;padding:5px;}
#exportBtn{background:none;border:1px solid var(--border);color:var(--text-dim);padding:5px 10px;cursor:pointer;font-family:inherit;font-size:10px;}
#exportBtn:hover{color:var(--green);border-color:var(--green-dim);}

#messages{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:18px;}
.msg{max-width:760px;}
.msg.user{align-self:flex-end;}
.msg.assistant{align-self:flex-start;}
.msg-label{font-size:9px;letter-spacing:1px;margin-bottom:4px;}
.msg.user .msg-label{color:var(--pink);text-align:right;}
.msg.assistant .msg-label{color:var(--green);}
.msg-bubble{padding:12px 14px;border:1px solid var(--border);font-size:13px;line-height:1.55;background:var(--panel);border-radius:3px;}
.msg.user .msg-bubble{background:rgba(255,62,165,0.06);border-color:var(--pink-dim);}
.msg.assistant .msg-bubble{background:rgba(57,255,122,0.05);border-color:var(--green-dim);}
.msg-bubble p{margin:0 0 8px;}
.msg-bubble p:last-child{margin-bottom:0;}
.msg-bubble pre{background:#060906 !important;border:1px solid var(--border);padding:10px;overflow-x:auto;border-radius:3px;font-size:12px;}
.msg-bubble code{font-family:'JetBrains Mono',monospace;}
.msg-bubble :not(pre)>code{background:#060906;padding:1px 4px;border-radius:2px;color:var(--green);}
.cursor-blink{display:inline-block;width:7px;height:13px;background:var(--green);animation:blink 1s steps(2) infinite;vertical-align:middle;}
@keyframes blink{50%{opacity:0;}}

.empty-state{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;color:var(--text-dim);gap:10px;}
.empty-state .pixel{font-size:11px;color:var(--green-dim);}

#inputBar{padding:16px 18px;border-top:1px solid var(--border);background:var(--bg2);display:flex;gap:10px;}
#msgInput{flex:1;background:#060906;border:1px solid var(--border);color:var(--text);padding:11px;font-family:inherit;font-size:13px;resize:none;}
#msgInput:focus{outline:none;border-color:var(--green-dim);}
#sendBtn{background:var(--green-dim);border:none;color:#fff;padding:0 18px;cursor:pointer;font-family:inherit;font-size:12px;letter-spacing:1px;}
#sendBtn:hover{background:var(--green);color:#000;}
#sendBtn:disabled{opacity:.4;cursor:not-allowed;}

#searchResults{position:absolute;top:60px;left:14px;right:14px;background:var(--panel);border:1px solid var(--green-dim);max-height:260px;overflow-y:auto;z-index:30;}
#searchResults .res-item{padding:8px 10px;font-size:11px;border-bottom:1px solid var(--border);cursor:pointer;}
#searchResults .res-item:hover{background:rgba(57,255,122,0.08);}
#searchResults .res-item .res-title{color:var(--green);margin-bottom:2px;}
#searchResults .res-item .res-snip{color:var(--text-dim);font-size:10px;}

::-webkit-scrollbar{width:8px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border);}
::-webkit-scrollbar-thumb:hover{background:var(--green-dim);}

.hidden{display:none !important;}
.toast{position:fixed;bottom:20px;right:20px;background:var(--panel);border:1px solid var(--pink-dim);color:var(--pink);padding:10px 16px;font-size:11px;z-index:200;}
</style>
</head>
<body class="crt">

<div id="authScreen">
  <div class="auth-box">
    <h1 class="pixel">&gt; AI_CHAT.exe</h1>
    <div class="error-msg" id="authError"></div>
    <div id="registerFields">
      <input type="text" id="regName" placeholder="name">
    </div>
    <input type="email" id="authEmail" placeholder="email">
    <input type="password" id="authPassword" placeholder="password">
    <button class="btn" id="authSubmit">LOGIN</button>
    <div class="toggle-link" id="authToggle">no account? register instead &gt;</div>
  </div>
</div>

<div id="app" class="hidden">
  <div id="sidebar" style="position:relative;">
    <div class="side-header">
      <div class="logo pixel">AI_CHAT</div>
    </div>
    <button class="btn new-chat-btn" id="newChatBtn">+ NEW CHAT</button>
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="search chats...">
    </div>
    <div id="searchResults" class="hidden"></div>
    <div id="chatList"></div>
    <div class="side-footer">
      <span id="userName"></span>
      <button id="logoutBtn">logout</button>
    </div>
  </div>

  <div id="main">
    <div id="topbar">
      <div id="chatTitle">no chat selected</div>
      <div style="display:flex;gap:10px;align-items:center;">
        <select id="modelSelect">
          <option value="llama-3.3-70b-versatile">Llama 3.3 70B (Groq)</option>
          <option value="llama-3.1-8b-instant">Llama 3.1 8B Instant</option>
          <option value="mixtral-8x7b-32768">Mixtral 8x7B</option>
          <option value="gemma2-9b-it">Gemma2 9B</option>
        </select>
        <button id="exportBtn">export ▾</button>
      </div>
    </div>
    <div id="messages"><div class="empty-state"><div class="pixel">[ NO CHAT OPEN ]</div><div>create a new chat or pick one from the sidebar</div></div></div>
    <div id="inputBar">
      <textarea id="msgInput" rows="1" placeholder="Type a message... (Enter to send, Shift+Enter for newline)"></textarea>
      <button id="sendBtn">SEND</button>
    </div>
  </div>
</div>

<script>
const API_BASE = window.location.origin.includes("file") ? "http://localhost:8000" : "http://localhost:8000";
let state = {
  accessToken: localStorage.getItem("access_token") || null,
  refreshToken: localStorage.getItem("refresh_token") || null,
  user: null,
  chats: [],
  activeChat: null,
  ws: null,
  isRegisterMode: false,
};

marked.setOptions({
  highlight: function(code, lang) {
    if (lang && hljs.getLanguage(lang)) {
      return hljs.highlight(code, { language: lang }).value;
    }
    return hljs.highlightAuto(code).value;
  }
});

function $(id){ return document.getElementById(id); }

function showToast(msg){
  const t = document.createElement("div");
  t.className = "toast";
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 3000);
}

async function api(path, options = {}) {
  const headers = options.headers || {};
  if (state.accessToken) headers["Authorization"] = "Bearer " + state.accessToken;
  if (options.body && !(options.body instanceof FormData)) headers["Content-Type"] = "application/json";
  const res = await fetch(API_BASE + path, { ...options, headers });
  if (res.status === 401 && state.refreshToken) {
    const refreshed = await tryRefresh();
    if (refreshed) return api(path, options);
  }
  return res;
}

async function tryRefresh(){
  try{
    const res = await fetch(API_BASE + "/refresh", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ refresh_token: state.refreshToken })
    });
    if(!res.ok) return false;
    const data = await res.json();
    state.accessToken = data.access_token;
    state.refreshToken = data.refresh_token;
    localStorage.setItem("access_token", data.access_token);
    localStorage.setItem("refresh_token", data.refresh_token);
    return true;
  }catch(e){ return false; }
}

// ---------- AUTH ----------
$("authToggle").onclick = () => {
  state.isRegisterMode = !state.isRegisterMode;
  $("registerFields").classList.toggle("hidden", !state.isRegisterMode);
  $("authSubmit").textContent = state.isRegisterMode ? "REGISTER" : "LOGIN";
  $("authToggle").textContent = state.isRegisterMode ? "have an account? login instead >" : "no account? register instead >";
  $("authError").textContent = "";
};
$("registerFields").classList.add("hidden");

$("authSubmit").onclick = async () => {
  const email = $("authEmail").value.trim();
  const password = $("authPassword").value;
  $("authError").textContent = "";
  try {
    let res;
    if (state.isRegisterMode) {
      const name = $("regName").value.trim();
      if(!name || !email || !password){ $("authError").textContent = "all fields required"; return; }
      res = await fetch(API_BASE + "/register", { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify({name, email, password}) });
    } else {
      if(!email || !password){ $("authError").textContent = "all fields required"; return; }
      res = await fetch(API_BASE + "/login", { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify({email, password}) });
    }
    if (!res.ok) {
      const err = await res.json().catch(()=>({detail:"auth failed"}));
      $("authError").textContent = err.detail || "auth failed";
      return;
    }
    const data = await res.json();
    state.accessToken = data.access_token;
    state.refreshToken = data.refresh_token;
    localStorage.setItem("access_token", data.access_token);
    localStorage.setItem("refresh_token", data.refresh_token);
    await initApp();
  } catch(e) {
    $("authError").textContent = "cannot reach server. is the backend running?";
  }
};

$("logoutBtn").onclick = () => {
  localStorage.removeItem("access_token");
  localStorage.removeItem("refresh_token");
  state = { ...state, accessToken:null, refreshToken:null, user:null, chats:[], activeChat:null };
  if(state.ws) state.ws.close();
  $("app").classList.add("hidden");
  $("authScreen").classList.remove("hidden");
};

// ---------- INIT ----------
async function initApp(){
  const res = await api("/me");
  if(!res.ok){ $("authScreen").classList.remove("hidden"); $("app").classList.add("hidden"); return; }
  state.user = await res.json();
  $("userName").textContent = state.user.name;
  $("authScreen").classList.add("hidden");
  $("app").classList.remove("hidden");
  await loadChats();
}

async function loadChats(){
  const res = await api("/chats");
  if(!res.ok) return;
  state.chats = await res.json();
  renderChatList();
}

function groupChatsByDate(chats){
  const groups = { Today: [], Yesterday: [], "Last Week": [], "Last Month": [], Older: [] };
  const now = new Date();
  chats.forEach(c => {
    const d = new Date(c.updated_at);
    const diffDays = Math.floor((now - d) / 86400000);
    if(diffDays <= 0) groups.Today.push(c);
    else if(diffDays === 1) groups.Yesterday.push(c);
    else if(diffDays <= 7) groups["Last Week"].push(c);
    else if(diffDays <= 30) groups["Last Month"].push(c);
    else groups.Older.push(c);
  });
  return groups;
}

function renderChatList(){
  const groups = groupChatsByDate(state.chats);
  const list = $("chatList");
  list.innerHTML = "";
  Object.entries(groups).forEach(([label, chats]) => {
    if(chats.length === 0) return;
    const labelEl = document.createElement("div");
    labelEl.className = "chat-group-label";
    labelEl.textContent = label;
    list.appendChild(labelEl);
    chats.forEach(chat => {
      const item = document.createElement("div");
      item.className = "chat-item" + (state.activeChat && state.activeChat.id === chat.id ? " active" : "");
      item.innerHTML = `<span class="title">${escapeHtml(chat.title)}</span>
        <div class="chat-actions">
          <button class="rename-btn" title="rename">✎</button>
          <button class="delete-btn" title="delete">✕</button>
        </div>`;
      item.querySelector(".title").onclick = () => openChat(chat);
      item.querySelector(".rename-btn").onclick = (e) => { e.stopPropagation(); renameChat(chat); };
      item.querySelector(".delete-btn").onclick = (e) => { e.stopPropagation(); deleteChat(chat); };
      list.appendChild(item);
    });
  });
}

function escapeHtml(str){
  const div = document.createElement("div");
  div.textContent = str;
  return div.innerHTML;
}

// ---------- CHAT CRUD ----------
$("newChatBtn").onclick = async () => {
  const res = await api("/chats", { method:"POST", body: JSON.stringify({ title:"New Chat", model_used: $("modelSelect").value }) });
  if(!res.ok) return;
  const chat = await res.json();
  state.chats.unshift(chat);
  renderChatList();
  openChat(chat);
};

async function renameChat(chat){
  const newTitle = prompt("Rename chat:", chat.title);
  if(!newTitle || newTitle === chat.title) return;
  const res = await api(`/chats/${chat.id}`, { method:"PATCH", body: JSON.stringify({ title:newTitle }) });
  if(!res.ok) return;
  const updated = await res.json();
  chat.title = updated.title;
  if(state.activeChat && state.activeChat.id === chat.id){
    state.activeChat.title = updated.title;
    $("chatTitle").textContent = updated.title;
  }
  renderChatList();
}

async function deleteChat(chat){
  if(!confirm(`Delete "${chat.title}"?`)) return;
  const res = await api(`/chats/${chat.id}`, { method:"DELETE" });
  if(!res.ok) return;
  state.chats = state.chats.filter(c => c.id !== chat.id);
  if(state.activeChat && state.activeChat.id === chat.id){
    state.activeChat = null;
    if(state.ws) state.ws.close();
    $("messages").innerHTML = '<div class="empty-state"><div class="pixel">[ NO CHAT OPEN ]</div><div>create a new chat or pick one from the sidebar</div></div>';
    $("chatTitle").textContent = "no chat selected";
  }
  renderChatList();
}

async function openChat(chat){
  state.activeChat = chat;
  $("chatTitle").textContent = chat.title;
  $("modelSelect").value = chat.model_used;
  renderChatList();
  const res = await api(`/messages/${chat.id}`);
  const messages = res.ok ? await res.json() : [];
  renderMessages(messages);
  connectWebSocket(chat.id);
}

function renderMessages(messages){
  const container = $("messages");
  container.innerHTML = "";
  if(messages.length === 0){
    container.innerHTML = '<div class="empty-state"><div class="pixel">[ EMPTY CHAT ]</div><div>say hello to get started</div></div>';
    return;
  }
  messages.forEach(m => appendMessage(m.role, m.content));
  container.scrollTop = container.scrollHeight;
}

function appendMessage(role, content, streaming=false){
  const container = $("messages");
  if(container.querySelector(".empty-state")) container.innerHTML = "";
  const wrap = document.createElement("div");
  wrap.className = "msg " + role;
  const label = document.createElement("div");
  label.className = "msg-label";
  label.textContent = role === "user" ? "YOU" : "ASSISTANT";
  const bubble = document.createElement("div");
  bubble.className = "msg-bubble";
  bubble.innerHTML = marked.parse(content || "") + (streaming ? '<span class="cursor-blink"></span>' : "");
  wrap.appendChild(label);
  wrap.appendChild(bubble);
  container.appendChild(wrap);
  container.scrollTop = container.scrollHeight;
  return bubble;
}

// ---------- WEBSOCKET ----------
function connectWebSocket(chatId){
  if(state.ws) state.ws.close();
  const wsBase = API_BASE.replace("http", "ws");
  const ws = new WebSocket(`${wsBase}/ws/chat/${chatId}`);
  state.ws = ws;
  let currentBubble = null;
  let currentContent = "";

  ws.onopen = () => {
    ws.send(JSON.stringify({ token: state.accessToken }));
  };

  ws.onmessage = (event) => {
    const data = JSON.parse(event.data);
    if(data.type === "stream_start"){
      currentContent = "";
      currentBubble = appendMessage("assistant", "", true);
    } else if(data.type === "token"){
      currentContent += data.content;
      if(currentBubble) currentBubble.innerHTML = marked.parse(currentContent) + '<span class="cursor-blink"></span>';
      $("messages").scrollTop = $("messages").scrollHeight;
    } else if(data.type === "stream_end"){
      if(currentBubble) currentBubble.innerHTML = marked.parse(data.full_content);
      $("sendBtn").disabled = false;
    } else if(data.type === "title_update"){
      if(state.activeChat){
        state.activeChat.title = data.title;
        $("chatTitle").textContent = data.title;
        const chatRef = state.chats.find(c => c.id === state.activeChat.id);
        if(chatRef) chatRef.title = data.title;
        renderChatList();
      }
    } else if(data.type === "error"){
      showToast(data.message || "An error occurred");
      $("sendBtn").disabled = false;
    }
  };

  ws.onerror = () => showToast("connection error");
}

// ---------- SEND MESSAGE ----------
function sendMessage(){
  const input = $("msgInput");
  const content = input.value.trim();
  if(!content || !state.activeChat) return;
  if(!state.ws || state.ws.readyState !== WebSocket.OPEN){ showToast("not connected"); return; }
  $("sendBtn").disabled = true;
  state.ws.send(JSON.stringify({ content, model: $("modelSelect").value }));
  input.value = "";
  input.style.height = "auto";
}

$("sendBtn").onclick = sendMessage;
$("msgInput").addEventListener("keydown", (e) => {
  if(e.key === "Enter" && !e.shiftKey){
    e.preventDefault();
    sendMessage();
  }
});
$("msgInput").addEventListener("input", (e) => {
  e.target.style.height = "auto";
  e.target.style.height = Math.min(e.target.scrollHeight, 160) + "px";
});

// ---------- SEARCH ----------
let searchTimeout;
$("searchInput").addEventListener("input", (e) => {
  clearTimeout(searchTimeout);
  const q = e.target.value.trim();
  if(!q){ $("searchResults").classList.add("hidden"); return; }
  searchTimeout = setTimeout(async () => {
    const res = await api(`/search?q=${encodeURIComponent(q)}`);
    if(!res.ok) return;
    const results = await res.json();
    renderSearchResults(results);
  }, 300);
});

function renderSearchResults(results){
  const box = $("searchResults");
  if(results.length === 0){ box.innerHTML = '<div class="res-item"><div class="res-snip">no results</div></div>'; box.classList.remove("hidden"); return; }
  box.innerHTML = "";
  results.forEach(r => {
    const item = document.createElement("div");
    item.className = "res-item";
    item.innerHTML = `<div class="res-title">${escapeHtml(r.title)}</div><div class="res-snip">${escapeHtml(r.snippet)}</div>`;
    item.onclick = () => {
      const chat = state.chats.find(c => c.id === r.chat_id);
      if(chat) openChat(chat);
      box.classList.add("hidden");
      $("searchInput").value = "";
    };
    box.appendChild(item);
  });
  box.classList.remove("hidden");
}
document.addEventListener("click", (e) => {
  if(!$("searchResults").contains(e.target) && e.target !== $("searchInput")){
    $("searchResults").classList.add("hidden");
  }
});

// ---------- EXPORT ----------
$("exportBtn").onclick = async () => {
  if(!state.activeChat){ showToast("open a chat first"); return; }
  const format = confirm("OK = Markdown, Cancel = TXT") ? "markdown" : "txt";
  const res = await api(`/export/${state.activeChat.id}?format=${format}`, { method:"POST" });
  if(!res.ok){ showToast("export failed"); return; }
  const content = await res.text();
  const blob = new Blob([content], { type: "text/plain" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `${state.activeChat.title.replace(/[^a-z0-9]+/gi,"_")}.${format === "txt" ? "txt" : "md"}`;
  a.click();
  URL.revokeObjectURL(url);
};

// ---------- BOOT ----------
if(state.accessToken){ initApp(); }
</script>
</body>
</html>
